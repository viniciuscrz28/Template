<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho | AutoTech Solutions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="assets/css/body.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Header -->
    <div id="header"></div>

    <!-- Sidebar -->
    <div id="sidebar"></div>

    <!-- Conteúdo -->
    <main class="conteudo">

        <div class="container-fluid">

            <!-- Título -->
            <div class="mb-5">

                <h1 class="fw-bold">
                    Carrinho de Compras
                </h1>

                <p class="text-muted">

                    Revise os produtos selecionados antes de solicitar
                    o orçamento.

                </p>

            </div>

            <!-- Carrinho vazio -->
            <div id="carrinhoVazio"
                 class="text-center py-5 d-none">

                <h3 class="mb-3">

                    🛒 Seu carrinho está vazio

                </h3>

                <p class="text-muted">

                    Adicione alguns produtos para começar.

                </p>

                <a href="produtos.html"
                   class="btn btn-primary">

                    Ver Produtos

                </a>

            </div>

            <!-- Lista de produtos -->
            <div id="conteudoCarrinho">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <div class="table-responsive">

                            <table class="table align-middle">

                                <thead>

                                    <tr>

                                        <th>Produto</th>

                                        <th>Preço</th>

                                        <th>Quantidade</th>

                                        <th>Subtotal</th>

                                        <th></th>

                                    </tr>

                                </thead>

                                <tbody id="itensCarrinho">

                                    <!-- carrinho.js irá preencher -->

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

                <!-- Resumo -->
                <div class="row mt-4">

                    <div class="col-lg-4 ms-auto">

                        <div class="card shadow-sm">

                            <div class="card-body">

                                <h4 class="mb-4">

                                    Resumo

                                </h4>

                                <div class="d-flex justify-content-between">

                                    <span>

                                        Quantidade de itens

                                    </span>

                                    <strong id="quantidadeItens">

                                        0

                                    </strong>

                                </div>

                                <hr>

                                <div class="d-flex justify-content-between">

                                    <span>

                                        Total

                                    </span>

                                    <strong id="valorTotal"
                                            class="text-primary">

                                        R$ 0,00

                                    </strong>

                                </div>

                                <div class="d-grid gap-2 mt-4">

                                    <button class="btn btn-success"
                                            onclick="solicitarOrcamento()">

                                        Solicitar Orçamento

                                    </button>

                                    <button class="btn btn-outline-danger"
                                            onclick="limparCarrinho()">

                                        Limpar Carrinho

                                    </button>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <footer id="footer"></footer>

    <script src="assets/js/carrinho.js"></script>
    <script src="assets/js/include.js"></script>

    <script>

        document.addEventListener(
            "DOMContentLoaded",
            carregarCarrinho
        );

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
```

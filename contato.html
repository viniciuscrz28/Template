<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTech Solutions | Automação Industrial</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/body.css">
</head>

<body>

<div id="header"></div>
<div id="sidebar"></div>

<main class="flex-grow-1">

    <div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">

            Entre em Contato

        </h1>

        <p class="lead text-muted">

            Estamos prontos para ajudar sua empresa a dar o próximo passo rumo à Indústria 4.0.

        </p>

    </div>

    <div class="row g-4">

        <!-- Formulário -->
        <div class="col-lg-8">

            <div class="card shadow-sm">

                <div class="card-body p-4">

                    <h3 class="mb-4">

                        Solicitar Orçamento

                    </h3>

                    <form id="formContato">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Nome Completo

                                </label>

                                <input type="text"
                                       class="form-control"
                                       id="nome"
                                       required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Empresa

                                </label>

                                <input type="text"
                                       class="form-control"
                                       id="empresa">

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    E-mail

                                </label>

                                <input type="email"
                                       class="form-control"
                                       id="email"
                                       required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Telefone

                                </label>

                                <input type="tel"
                                       class="form-control"
                                       id="telefone">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Solução de Interesse

                            </label>

                            <select class="form-select"
                                    id="interesse">

                                <option>

                                    CLP Industrial

                                </option>

                                <option>

                                    IoT Industrial

                                </option>

                                <option>

                                    Painéis Automatizados

                                </option>

                                <option>

                                    Consultoria em Automação

                                </option>

                                <option>

                                    Outro

                                </option>

                            </select>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Descreva sua necessidade

                            </label>

                            <textarea class="form-control"
                                      rows="5"
                                      id="mensagem"
                                      required></textarea>

                        </div>

                        <button type="button"
                                class="btn btn-primary"
                                onclick="enviarWhatsApp()">

                            Solicitar Orçamento

                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- Informações -->
        <div class="col-lg-4">

            <div class="card shadow-sm mb-4">

                <div class="card-body">

                    <h4 class="mb-3">

                        Informações de Contato

                    </h4>

                    <p>

                        📞 (44) 99999-9999

                    </p>

                    <p>

                        ✉️ contato@autotechsolutions.com.br

                    </p>

                    <p>

                        📍 Maringá - PR

                    </p>

                </div>

            </div>

            <div class="card shadow-sm">

                <div class="card-body">

                    <h4 class="mb-3">

                        Horário de Atendimento

                    </h4>

                    <p>

                        Segunda a Sexta

                    </p>

                    <p>

                        08h00 às 18h00

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>
</main>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/produtos.js"></script>

</body>
</html>
